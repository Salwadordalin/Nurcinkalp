<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nurçin </title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        /* Yazı için SVG katmanı - Canvas ile üst üste biniyor */
        #svgContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        path {
            fill: none;
            stroke: white;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="svgContainer">
        <svg width="400" height="200" viewBox="0 0 400 200">
            <path id="nurcinPath" d="M50,100 C70,100 80,40 100,100 L100,140 M100,100 C120,100 130,140 150,140 C170,140 170,100 150,100 M180,100 L180,140 M180,110 C200,100 220,100 220,120 M240,120 C240,100 280,100 280,130 C280,160 250,160 240,140 M260,160 L260,180 M300,100 L300,140 M300,80 L301,81 M320,100 C340,100 350,140 370,140 L370,100" />
        </svg>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const path = document.getElementById('nurcinPath');
        const pathLength = path.getTotalLength();

        // Yazıyı başlangıçta tamamen gizle
        path.style.strokeDasharray = pathLength;
        path.style.strokeDashoffset = pathLength;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        let angle = 0;
        let hue = 120;

        function heartMath(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x, y };
        }

        class Particle {
            constructor(x, y, h) {
                this.x = x; this.y = y;
                this.color = `hsl(${h}, 100%, 65%)`;
                const a = Math.random() * Math.PI * 2;
                const speed = Math.random() * 1.8 + 0.3;
                this.vx = Math.cos(a) * speed;
                this.vy = Math.sin(a) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.015 + 0.012;
                this.size = Math.random() * 2.2 + 0.5;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const scale = Math.min(canvas.width, canvas.height) / 50;
            const hpos = heartMath(angle);
            const hx = canvas.width / 2 + hpos.x * scale;
            const hy = canvas.height / 2 + hpos.y * scale;

            // 1. Kalp Öncü Noktası
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            // 2. Kalp Parçacıkları
            for(let i=0; i<12; i++) particles.push(new Particle(hx, hy, hue));

            // 3. Yazı Senkronizasyonu (Buraya dikkat)
            // Kalp tam turu (2*PI) tamamlayana kadar yazıyı pürüzsüzce açıyoruz
            const progress = (angle % (Math.PI * 2)) / (Math.PI * 2);
            path.style.strokeDashoffset = pathLength - (pathLength * progress);
            
            // Yazının bittiği anın koordinatlarını bul ve oradan da toz fışkırt
            const currentPoint = path.getPointAtLength(pathLength * progress);
            const svgRect = document.getElementById('svgContainer').getBoundingClientRect();
            const tx = svgRect.left + currentPoint.x;
            const ty = svgRect.top + currentPoint.y;
            
            for(let i=0; i<5; i++) particles.push(new Particle(tx, ty, hue));

            // Parçacıkları Çiz
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
                else particles[i].draw();
            }

            angle += 0.02; // Akıcılık için biraz daha yavaşlattım
            hue += 0.4;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
