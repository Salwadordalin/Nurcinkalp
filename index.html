<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nurçin - Apple Hello Style</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #text-container {
            position: relative;
            z-index: 2;
            pointer-events: none;
        }

        /* Apple "Hello" tarzı ince, beyaz ve zarif yazı */
        svg {
            width: 500px;
            overflow: visible;
        }

        path {
            fill: none;
            stroke: white;
            stroke-width: 2.5; /* Apple tarzı ince hat */
            stroke-linecap: round;
            stroke-linejoin: round;
            /* Hafif bir cam parlaması efekti */
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div id="text-container">
        <svg viewBox="0 0 400 150">
            <path id="nurcinPath" d="M50,80 C60,20 90,20 95,80 L95,110 M95,80 C110,60 130,60 135,80 C135,100 115,110 110,95 M150,75 L150,110 M150,85 C165,70 185,70 185,90 M200,100 C200,70 240,70 240,100 C240,120 210,130 205,115 M215,135 L225,145 M250,75 L250,110 M250,60 L251,61 M275,75 L275,110 M275,85 C290,70 315,70 315,110" />
        </svg>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const path = document.getElementById('nurcinPath');
        const pathLength = path.getTotalLength();

        // Yazıyı en başta gizle
        path.style.strokeDasharray = pathLength;
        path.style.strokeDashoffset = pathLength;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        let angle = 0;
        let hue = 120;

        function heartMath(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x, y };
        }

        class Particle {
            constructor(x, y, h) {
                this.x = x; this.y = y;
                this.color = `hsl(${h}, 100%, 65%)`;
                const a = Math.random() * Math.PI * 2;
                const speed = Math.random() * 1.5 + 0.2;
                this.vx = Math.cos(a) * speed;
                this.vy = Math.sin(a) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 1.8 + 0.5;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const scale = Math.min(canvas.width, canvas.height) / 50;
            const hpos = heartMath(angle);
            const hx = canvas.width / 2 + hpos.x * scale;
            const hy = canvas.height / 2 + hpos.y * scale;

            // 1. Kalp ve Parçacıklar
            ctx.shadowBlur = 15;
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(hx, hy, 3.5, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            for(let i=0; i<8; i++) particles.push(new Particle(hx, hy, hue));

            // 2. Apple "Hello" Yazma Animasyonu
            // Kalp ile tam senkronize ilerler
            const progress = (angle % (Math.PI * 2)) / (Math.PI * 2);
            path.style.strokeDashoffset = pathLength - (pathLength * progress);

            // Yazının o anki ucundan parçacık fışkırt (Takipçi Efekt)
            const point = path.getPointAtLength(pathLength * progress);
            const svgBox = document.querySelector('svg').getBoundingClientRect();
            const tx = svgBox.left + (point.x * (svgBox.width / 400));
            const ty = svgBox.top + (point.y * (svgBox.height / 150));
            for(let i=0; i<3; i++) particles.push(new Particle(tx, ty, hue));

            // 3. Parçacıkları Güncelle
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
                else particles[i].draw();
            }

            angle += 0.022; 
            hue += 0.4;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
